<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuna Scripts | V2 Database</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <img src="logo.gif" alt="Logo" class="nav-logo">
            <span class="brand-name">Tuna Scripts</span>
        </div>
        <div class="nav-center">
            <a href="#" class="nav-link active">Scripts</a>
            <a href="#" class="nav-link">Trending</a>
            <a href="#" class="nav-link">Executors</a>
        </div>
        <div class="nav-right">
            <button class="btn-pro">GET PRO</button>
            <a href="login.html" class="btn-login">Login</a>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="hero-section">
            <div class="search-container">
                <input type="text" placeholder="Search scripts, games, or creators...">
                <button class="search-btn">Search</button>
            </div>
            <div class="platform-stats">
                <span>📁 30,000+ scripts</span>
                <span>👥 167K+ users</span>
                <span>🟢 6,534 online</span>
            </div>
        </div>

        <div class="section-header">
            <h2>Latest Scripts</h2>
            <button class="btn-pro">+ Add your script</button>
        </div>
        
        <div class="filter-bar">
            <div class="filter-pills">
                <button class="pill active">All</button>
                <button class="pill">🔑 No keysystem</button>
                <button class="pill">✔️ Verified only</button>
            </div>
            <div class="sort-dropdown">Newest First ⚙️</div>
        </div>

        <div class="grid" id="scriptGrid"></div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <h2 id="modalTitle">Script Title</h2>
            </div>
            <p id="modalDesc" class="text-muted" style="margin-bottom: 1rem;"></p>
            
            <div class="code-container">
                <pre><code id="modalCode"></code></pre>
            </div>
            <button class="magic-link-btn" onclick="copyCode()" style="width: 100%; margin-bottom: 2rem;">COPY SOURCE CODE</button>
            
            <div class="comments-section">
                <h3 style="color: white; margin-bottom: 1rem;">Community Comments</h3>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <input type="text" id="commentInput" class="login-input" style="flex: 1;" placeholder="Write a comment...">
                    <button class="btn-pro" id="postCommentBtn">POST</button>
                </div>
                <div id="commentsList" class="comments-list"></div>
            </div>
        </div>
    </div>

</body>
</html>
