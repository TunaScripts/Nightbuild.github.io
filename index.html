<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuna Scripts | Premium Database</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h1>TUNA<span>SCRIPTS</span></h1>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search database...">
            <select id="categoryFilter">
                <option value="All">All Categories</option>
                <option value="UI">UI</option>
                <option value="World">World</option>
                <option value="Utility">Utility</option>
            </select>
        </div>
    </header>

    <main>
        <div class="grid" id="scriptGrid">
            </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn">&times;</button>
            <div class="modal-header">
                <h2 id="modalTitle">Script Title</h2>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <p id="modalDesc" class="modal-description"></p>
            <div class="code-container">
                <pre><code id="modalCode"></code></pre>
            </div>
            <button class="action-btn" id="copyBtn">COPY SOURCE CODE</button>
        </div>
    </div>

    <div id="toast" class="toast">Code copied to clipboard!</div>

</body>
</html>
