<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tuna Scripts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-header">
            <img src="logo.gif" alt="Tuna Scripts" class="login-logo">
            <h2>Welcome to Tuna Scripts</h2>
        </div>

        <div class="login-form">
            <label>Enter your email</label>
            <input type="email" placeholder="name@email.com" class="login-input">
            <button class="magic-link-btn" onclick="window.location.href='index.html'">Send magic link</button>
            
            <div class="divider"><span>OR</span></div>
            
            <button class="social-btn" onclick="window.location.href='index.html'">
                Continue with Google
            </button>
            <button class="social-btn github-btn" onclick="window.location.href='index.html'">
                Continue with GitHub
            </button>
        </div>
        
        <div class="login-footer">
            Need help? <a href="#">Need more help with logging in?</a><br><br>
            By logging in, you agree to our <a href="#">Terms of Service</a>.
        </div>
    </div>

</body>
</html>
