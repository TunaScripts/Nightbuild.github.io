<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tuna Scripts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-header">
            <img src="logo.gif" alt="Tuna Scripts" class="login-logo">
            <h2>Welcome to Tuna Scripts</h2>
        </div>

        <div class="login-form">
            <label>Enter your email</label>
            <input type="email" id="emailInput" placeholder="name@email.com" class="login-input">
            <button class="magic-link-btn" id="emailBtn">Send magic link</button>
            
            <div class="divider"><span>OR</span></div>
            
            <button class="social-btn" id="googleBtn">
                Continue with Google
            </button>
            <button class="social-btn github-btn" id="githubBtn">
                Continue with GitHub
            </button>
        </div>
        
        <div class="login-footer">
            Need help? <a href="#">Need more help with logging in?</a><br><br>
            By logging in, you agree to our <a href="#">Terms of Service</a>.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // --- REPLACE THIS WITH YOUR EXACT FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "tuna-scripts.firebaseapp.com",
            projectId: "tuna-scripts",
            storageBucket: "tuna-scripts.appspot.com",
            messagingSenderId: "123456789",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Google Login
        document.getElementById('googleBtn').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Success! Send them to the main dashboard
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    alert("Google Login Error: " + error.message);
                });
        });

        // GitHub Login
        document.getElementById('githubBtn').addEventListener('click', () => {
            const provider = new GithubAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Success! Send them to the main dashboard
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    alert("GitHub Login Error: " + error.message);
                });
        });

        // Email Placeholder (Firebase Magic Links require extra setup in the console)
        document.getElementById('emailBtn').addEventListener('click', () => {
            const email = document.getElementById('emailInput').value;
            if(email) {
                alert("Magic link sent to " + email + " (Requires Firebase Email Auth to be enabled in console)");
            } else {
                alert("Please enter an email first.");
            }
        });
    </script>

</body>
</html>
